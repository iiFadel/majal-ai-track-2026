<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .row { display:flex; gap:6px; justify-content:center; align-items:center; margin-bottom:10px; }
  .row .lbl { font-size:12px; font-weight:800; color:#517079; margin-right:2px; }
  .stage { display:flex; gap:20px; align-items:flex-start; justify-content:center; }
  #viewWrap { position:relative; }
  canvas { border:1px solid #cbd5e1; border-radius:8px; image-rendering: pixelated; display:block; }
  #tip {
    position:absolute; pointer-events:none; display:none;
    background:#0f172a; color:#fff; font-family:"JetBrains Mono",Menlo,monospace;
    font-size:12px; padding:4px 8px; border-radius:6px; white-space:nowrap; z-index:5;
  }
  /* No max-height / no overflow: the whole 24x24 table is sized to fit the panel outright,
     so view 3 never scrolls. */
  #numsWrap { border:1px solid #cbd5e1; border-radius:8px; display:none; overflow:hidden; }
  table.n { border-collapse:collapse; }
  table.n td {
    width:23px; height:19px; font-size:9px; text-align:center;
    font-family:"JetBrains Mono",Menlo,monospace; border:1px solid #e2e8f0;
  }
  #caption { margin-top:10px; font-size:13px; color:#64748b; text-align:center; min-height:20px; }
</style>
</head>
<body>
<div class="w">
  <div class="row">
    <span class="lbl">Image:</span>
    <button id="dlincoln" class="on">&#127913; Lincoln</button>
    <button id="dcat">&#128049; Cat</button>
    <button id="dsunflower">&#127803; Sunflower</button>
  </div>
  <div class="row">
    <button id="bPhoto" class="on">1 &#183; Photo</button>
    <button id="bPix">2 &#183; Zoom in&#8230; pixels!</button>
    <button id="bNums">3 &#183; What the computer sees</button>
  </div>
  <div class="stage">
    <div id="viewWrap">
      <canvas id="cv" width="384" height="384"></canvas>
      <div id="tip"></div>
    </div>
    <div id="numsWrap"></div>
  </div>
  <div id="caption"></div>
</div>
<script src="pixels_data.js"></script>
<script>
(function () {
  function $(id) { return document.getElementById(id); }
  var cv = $("cv"), ctx = cv.getContext("2d");
  var mode = "photo";
  var dsKey = "lincoln";
  var GRID = DATASETS[dsKey].grid;
  var N = GRID.length; // 24
  var img = new Image();
  var KEYS = ["lincoln", "cat", "sunflower"];

  function captions() {
    return {
      photo: DATASETS[dsKey].photoCap,
      pix: "Zoom far enough and the photo dissolves into a grid of squares: pixels. Hover them!",
      nums: "Each pixel is just a brightness number, 0 (black) to 255 (white). THIS is all the computer gets."
    };
  }

  function drawPhoto() {
    ctx.imageSmoothingEnabled = true;
    ctx.clearRect(0, 0, 384, 384);
    ctx.drawImage(img, 0, 0, 384, 384);
  }
  function drawBlocks() {
    ctx.imageSmoothingEnabled = false;
    var cell = 384 / N;
    for (var r = 0; r < N; r++) {
      for (var c = 0; c < N; c++) {
        var v = GRID[r][c];
        ctx.fillStyle = "rgb(" + v + "," + v + "," + v + ")";
        ctx.fillRect(c * cell, r * cell, cell + 1, cell + 1);
      }
    }
    ctx.strokeStyle = "rgba(100,116,139,0.35)";
    ctx.lineWidth = 1;
    for (var i = 0; i <= N; i++) {
      ctx.beginPath(); ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, 384); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * cell); ctx.lineTo(384, i * cell); ctx.stroke();
    }
  }
  function buildNums() {
    var html = '<table class="n">';
    for (var r = 0; r < N; r++) {
      html += "<tr>";
      for (var c = 0; c < N; c++) {
        var v = GRID[r][c];
        var fg = v > 140 ? "#0f172a" : "#f8fafc";
        html += '<td style="background:rgb(' + v + ',' + v + ',' + v + ');color:' + fg + '">' + v + "</td>";
      }
      html += "</tr>";
    }
    $("numsWrap").innerHTML = html + "</table>";
  }

  function render() {
    if (mode === "nums") {
      $("viewWrap").style.display = "none";
      $("numsWrap").style.display = "block";
    } else {
      $("viewWrap").style.display = "block";
      $("numsWrap").style.display = "none";
      if (mode === "photo") { drawPhoto(); } else { drawBlocks(); }
    }
  }

  function setMode(m) {
    mode = m;
    $("bPhoto").className = m === "photo" ? "on" : "";
    $("bPix").className = m === "pix" ? "on" : "";
    $("bNums").className = m === "nums" ? "on" : "";
    $("caption").textContent = captions()[m];
    render();
  }

  function setDataset(k) {
    dsKey = k;
    GRID = DATASETS[k].grid;
    N = GRID.length;
    KEYS.forEach(function (j) { $("d" + j).className = (j === k) ? "on" : ""; });
    buildNums();
    $("caption").textContent = captions()[mode];
    // img.onload fires async; render() there covers photo mode. Render now for the other modes
    // so switching image while in view 2 or 3 updates instantly.
    if (mode !== "photo") { render(); }
    img.src = DATASETS[k].src;
  }

  cv.addEventListener("mousemove", function (e) {
    if (mode !== "pix") { $("tip").style.display = "none"; return; }
    var rect = cv.getBoundingClientRect();
    var x = e.clientX - rect.left, y = e.clientY - rect.top;
    var cell = 384 / N;
    var c = Math.min(N - 1, Math.max(0, Math.floor(x / cell)));
    var r = Math.min(N - 1, Math.max(0, Math.floor(y / cell)));
    var t = $("tip");
    t.style.display = "block";
    t.style.left = (x + 14) + "px";
    t.style.top = (y - 10) + "px";
    t.innerHTML = "row " + r + ", col " + c + " &#8594; <b>" + GRID[r][c] + "</b>";
  });
  cv.addEventListener("mouseleave", function () { $("tip").style.display = "none"; });

  $("bPhoto").onclick = function () { setMode("photo"); };
  $("bPix").onclick = function () { setMode("pix"); };
  $("bNums").onclick = function () { setMode("nums"); };
  KEYS.forEach(function (k) { $("d" + k).onclick = function () { setDataset(k); }; });

  img.onload = function () { render(); };
  buildNums();
  setMode("photo");
  img.src = DATASETS[dsKey].src;
})();
</script>
</body>
</html>
