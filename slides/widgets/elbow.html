<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .stage { display:flex; gap:20px; align-items:flex-start; justify-content:center; flex-wrap:wrap; }
  .col { text-align:center; }
  .col h4 { margin:0 0 8px; font-size:12px; font-weight:800; color:#517079;
            text-transform:uppercase; letter-spacing:.08em; }
  canvas { border:1px solid #CDD8DA; border-radius:10px; background:#fff; display:block; }
  #kbtns { display:flex; gap:5px; justify-content:center; margin-bottom:12px; flex-wrap:wrap; }
  #cap { margin-top:10px; font-size:13.5px; color:#12333D; text-align:center; min-height:40px; }
</style>
</head>
<body>
<div class="w">
  <div id="kbtns"></div>
  <div class="stage">
    <div class="col"><h4>Clustering with your K</h4><canvas id="cl" width="380" height="300"></canvas></div>
    <div class="col"><h4>Inertia vs K &#8212; your elbow plot</h4><canvas id="ch" width="380" height="300"></canvas></div>
  </div>
  <div id="cap">The data secretly contains <b>4</b> groups. Try K values and build the elbow plot yourself &#8212; can you find the bend?</div>
</div>
<script>
(function () {
  function $(id) { return document.getElementById(id); }
  var PAL = ["#00567D","#FFD728","#33D2CB","#C0504D","#8064A2","#1F8F89","#F79646","#4BACC6"];
  var W = 380, H = 300;
  var seed = 12;
  function rng() { seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296; }
  function gauss() { return (rng()+rng()+rng()+rng()-2) * 1.7; }

  // 4 true clusters
  var pts = [];
  [[80,70],[290,80],[110,230],[300,225]].forEach(function (c) {
    for (var i = 0; i < 40; i++) {
      pts.push([Math.min(W-10,Math.max(10,c[0]+gauss()*26)),
                Math.min(H-10,Math.max(10,c[1]+gauss()*24))]);
    }
  });
  function dist2(a,b){var dx=a[0]-b[0],dy=a[1]-b[1];return dx*dx+dy*dy;}

  function kmeans(K) {
    var best = null;
    for (var r = 0; r < 5; r++) {
      var cents = [];
      for (var k = 0; k < K; k++) { cents.push(pts[Math.floor(rng()*pts.length)].slice()); }
      var assign = new Array(pts.length).fill(0);
      for (var it = 0; it < 40; it++) {
        for (var i = 0; i < pts.length; i++) {
          var bi = 0, bd = Infinity;
          for (var k2 = 0; k2 < K; k2++) {
            var d = dist2(pts[i], cents[k2]);
            if (d < bd) { bd = d; bi = k2; }
          }
          assign[i] = bi;
        }
        var moved = 0;
        for (var k3 = 0; k3 < K; k3++) {
          var sx=0, sy=0, n=0;
          for (var i2 = 0; i2 < pts.length; i2++) {
            if (assign[i2] === k3) { sx+=pts[i2][0]; sy+=pts[i2][1]; n++; }
          }
          if (n > 0) {
            moved = Math.max(moved, Math.abs(cents[k3][0]-sx/n)+Math.abs(cents[k3][1]-sy/n));
            cents[k3] = [sx/n, sy/n];
          }
        }
        if (moved < 0.3) { break; }
      }
      var wss = 0;
      for (var i3 = 0; i3 < pts.length; i3++) { wss += dist2(pts[i3], cents[assign[i3]]); }
      if (!best || wss < best.wss) { best = { wss: wss, assign: assign.slice(), cents: cents }; }
    }
    return best;
  }

  var tried = {};   // K -> wss
  var clctx = $("cl").getContext("2d"), chctx = $("ch").getContext("2d");

  function drawClusters(res, K) {
    clctx.clearRect(0, 0, W, H);
    for (var i = 0; i < pts.length; i++) {
      clctx.fillStyle = PAL[res.assign[i] % PAL.length];
      clctx.beginPath(); clctx.arc(pts[i][0], pts[i][1], 4, 0, 7); clctx.fill();
    }
    for (var k = 0; k < K; k++) {
      clctx.fillStyle = PAL[k % PAL.length];
      clctx.strokeStyle = "#12333D"; clctx.lineWidth = 3;
      clctx.beginPath(); clctx.arc(res.cents[k][0], res.cents[k][1], 10, 0, 7);
      clctx.fill(); clctx.stroke();
    }
  }
  function drawChart() {
    var c = chctx;
    c.clearRect(0, 0, W, H);
    var L = 46, B = H - 36, T = 16, R = W - 14;
    c.strokeStyle = "#8AA1A8"; c.lineWidth = 1.5;
    c.beginPath(); c.moveTo(L, T); c.lineTo(L, B); c.lineTo(R, B); c.stroke();
    c.fillStyle = "#517079"; c.font = "700 12px 'Nunito Sans', sans-serif";
    c.textAlign = "center";
    c.fillText("K (number of clusters)", (L+R)/2, H - 10);
    c.save(); c.translate(14, (T+B)/2); c.rotate(-Math.PI/2);
    c.fillText("inertia (lower = tighter)", 0, 0); c.restore();
    var maxW = 0;
    for (var k in tried) { maxW = Math.max(maxW, tried[k]); }
    if (maxW === 0) { return; }
    function X(k) { return L + (k - 1) * (R - L) / 7; }
    function Y(w) { return B - (w / maxW) * (B - T - 8); }
    var ks = Object.keys(tried).map(Number).sort(function (a,b) { return a-b; });
    c.strokeStyle = "#00567D"; c.lineWidth = 2.5;
    c.beginPath();
    ks.forEach(function (k, i) { if (i === 0) { c.moveTo(X(k), Y(tried[k])); } else { c.lineTo(X(k), Y(tried[k])); } });
    c.stroke();
    ks.forEach(function (k) {
      c.fillStyle = (k === 4) ? "#FFD728" : "#1F8F89";
      c.strokeStyle = "#12333D"; c.lineWidth = 2;
      c.beginPath(); c.arc(X(k), Y(tried[k]), 6, 0, 7); c.fill(); c.stroke();
      c.fillStyle = "#12333D"; c.textAlign = "center";
      c.fillText(String(k), X(k), B + 15);
    });
    if (ks.length >= 6 && tried[4]) {
      c.fillStyle = "#C0504D"; c.font = "800 13px 'Nunito Sans', sans-serif";
      c.fillText("&#8592; the elbow!".replace("&#8592;", "\u2190"), X(4) + 62, Y(tried[4]) - 6);
    }
  }

  var kb = $("kbtns");
  for (var k = 1; k <= 8; k++) {
    (function (K) {
      var b = document.createElement("button");
      b.textContent = "K = " + K;
      b.id = "kb" + K;
      b.onclick = function () {
        var res = kmeans(K);
        tried[K] = res.wss;
        drawClusters(res, K);
        drawChart();
        for (var m = 1; m <= 8; m++) { $("kb"+m).className = (m === K) ? "on" : ""; }
        var n = Object.keys(tried).length;
        if (K === 1) { $("cap").innerHTML = "K=1: everything in ONE cluster &#8212; inertia is huge. Keep going."; }
        else if (n >= 6 && tried[4]) { $("cap").innerHTML = "See it? Inertia crashes until <b>K=4</b>, then barely improves. The bend = the elbow = the natural number of groups. (Yes &#8212; the data really has 4.)"; }
        else if (K > 5) { $("cap").innerHTML = "More clusters ALWAYS lowers inertia a little &#8212; but look how tiny the improvement is now. That flattening is the signal."; }
        else { $("cap").innerHTML = "Logged inertia for K=" + K + ". Try more values &#8212; you need the SHAPE of the curve, not one point."; }
      };
      kb.appendChild(b);
    })(k);
  }
  drawChart();
})();
</script>
</body>
</html>
