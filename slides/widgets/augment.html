<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .stage { display:flex; gap:26px; align-items:flex-start; justify-content:center; flex-wrap:wrap; }
  .col { text-align:center; }
  .col h4 { margin:0 0 8px; font-size:13px; font-weight:700; color:#475569;
            text-transform:uppercase; letter-spacing:.06em; }
  canvas { border:1px solid #cbd5e1; border-radius:10px; display:block; background:#fff; }
  .sliders { text-align:left; min-width:270px; }
  .sl { margin:9px 0; }
  .sl label { display:flex; justify-content:space-between; font-size:13px; color:#475569; margin-bottom:2px; }
  .sl label b { font-family:"JetBrains Mono",Menlo,monospace; color:#0f172a; }
  input[type=range] { width:100%; accent-color:#7c3aed; }
  .toggles { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
  #verdict { margin-top:10px; font-size:14px; text-align:center; min-height:24px; font-weight:600; }
</style>
</head>
<body>
<div class="w">
  <div class="stage">
    <div class="col"><h4>Original</h4><canvas id="corig" width="240" height="240"></canvas></div>
    <div class="col"><h4>Augmented &#8220;new&#8221; image</h4><canvas id="caug" width="240" height="240"></canvas></div>
    <div class="sliders">
      <div class="toggles">
        <button id="tFlipH">&#8596; Flip horizontal</button>
        <button id="tFlipV">&#8597; Flip vertical</button>
        <button id="tGray">Grayscale</button>
        <button id="tReset">&#8634; Reset</button>
      </div>
      <div class="sl"><label>Rotation <b id="vRot">0&#176;</b></label>
        <input type="range" id="rRot" min="-180" max="180" value="0"></div>
      <div class="sl"><label>Brightness <b id="vBri">100%</b></label>
        <input type="range" id="rBri" min="40" max="180" value="100"></div>
      <div class="sl"><label>Zoom <b id="vZoom">100%</b></label>
        <input type="range" id="rZoom" min="100" max="200" value="100"></div>
      <div id="verdict"></div>
    </div>
  </div>
</div>
<script>
(function () {
  function $(id) { return document.getElementById(id); }

  // ---------- CAT PLAYGROUND ----------
  var img = new Image();
  var st = { fh: false, fv: false, gray: false, rot: 0, bri: 100, zoom: 100 };

  function drawAug() {
    var cv = $("caug"), ctx = cv.getContext("2d");
    ctx.save();
    ctx.clearRect(0, 0, 240, 240);
    ctx.filter = "brightness(" + st.bri + "%)" + (st.gray ? " grayscale(1)" : "");
    ctx.translate(120, 120);
    ctx.rotate(st.rot * Math.PI / 180);
    ctx.scale(st.fh ? -1 : 1, st.fv ? -1 : 1);
    var s = 240 * st.zoom / 100;
    ctx.drawImage(img, -s / 2, -s / 2, s, s);
    ctx.restore();

    var changed = st.fh || st.fv || st.gray || st.rot !== 0 || st.bri !== 100 || st.zoom !== 100;
    var risky = st.fv || Math.abs(st.rot) > 60;
    var v = $("verdict");
    if (!changed) { v.innerHTML = '<span style="color:#94a3b8">Move a slider &#8212; make "new" training data.</span>'; }
    else if (risky) { v.innerHTML = '<span style="color:#d97706">&#9888;&#65039; Still a cat&#8230; but real photos are rarely upside-down. Extreme augmentations can hurt.</span>'; }
    else { v.innerHTML = '<span style="color:#059669">&#9989; Still 100% a cat &#8212; a FREE new training example!</span>'; }
  }
  function syncLabels() {
    $("vRot").textContent = st.rot + "\u00B0";
    $("vBri").textContent = st.bri + "%";
    $("vZoom").textContent = st.zoom + "%";
    $("tFlipH").className = st.fh ? "on" : "";
    $("tFlipV").className = st.fv ? "on" : "";
    $("tGray").className = st.gray ? "on" : "";
  }
  $("tFlipH").onclick = function () { st.fh = !st.fh; syncLabels(); drawAug(); };
  $("tFlipV").onclick = function () { st.fv = !st.fv; syncLabels(); drawAug(); };
  $("tGray").onclick  = function () { st.gray = !st.gray; syncLabels(); drawAug(); };
  $("tReset").onclick = function () {
    st = { fh:false, fv:false, gray:false, rot:0, bri:100, zoom:100 };
    $("rRot").value = 0; $("rBri").value = 100; $("rZoom").value = 100;
    syncLabels(); drawAug();
  };
  $("rRot").oninput  = function () { st.rot  = +this.value; syncLabels(); drawAug(); };
  $("rBri").oninput  = function () { st.bri  = +this.value; syncLabels(); drawAug(); };
  $("rZoom").oninput = function () { st.zoom = +this.value; syncLabels(); drawAug(); };

  img.onload = function () {
    $("corig").getContext("2d").drawImage(img, 0, 0, 240, 240);
    syncLabels(); drawAug();
  };
