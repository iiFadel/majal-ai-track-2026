<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .stage { display:flex; gap:20px; align-items:flex-start; justify-content:center; flex-wrap:wrap; }
  .col { text-align:center; }
  .col h4 { margin:0 0 8px; font-size:12px; font-weight:800; color:#517079;
            text-transform:uppercase; letter-spacing:.08em; }
  canvas { border:1px solid #CDD8DA; border-radius:10px; background:#fff; display:block; }
  #dsbtns { display:flex; gap:6px; justify-content:center; margin-bottom:12px; flex-wrap:wrap; }
  .sl { max-width:330px; margin:10px auto 0; }
  .sl label { display:flex; justify-content:space-between; font-size:12.5px; color:#517079; font-weight:700; margin-bottom:2px; }
  .sl label b { font-family:"JetBrains Mono",Menlo,monospace; color:#00567D; }
  input[type=range] { width:100%; accent-color:#1F8F89; }
  #verdict { margin-top:10px; font-size:13.5px; color:#12333D; text-align:center; min-height:40px; }
</style>
</head>
<body>
<div class="w">
  <div id="dsbtns">
    <button id="d0" class="on">&#127769; Two moons</button>
    <button id="d1">&#128993; Rings</button>
    <button id="d2">&#128064; Blobs + loners</button>
    <button id="d3">&#9878;&#65039; Uneven density</button>
    <button id="d4">&#127922; No real structure</button>
  </div>
  <div class="stage">
    <div class="col"><h4>K-Means (must pick K)</h4><canvas id="ckm" width="360" height="290"></canvas></div>
    <div class="col"><h4>DBSCAN (finds clusters itself)</h4><canvas id="cdb" width="360" height="290"></canvas>
      <div class="sl"><label>Neighbor distance (eps) <b id="vEps">20</b></label>
        <input type="range" id="rEps" min="8" max="45" value="20"></div>
    </div>
  </div>
  <div id="verdict"></div>
</div>
<script>
(function () {
  function $(id) { return document.getElementById(id); }
  var W = 360, H = 290, PAL = ["#00567D","#FFD728","#33D2CB","#C0504D","#8064A2","#1F8F89"];
  var seed = 5;
  function rng() { seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296; }
  function gauss() { return (rng()+rng()+rng()+rng()-2) * 1.7; }

  function moons() {
    // classic two-moons: m1=(cos t, sin t); m2=(1-cos t, 0.5-sin t)
    var sx = 105, sy = 130, ox = 130, oy = 180, p = [];
    for (var i = 0; i < 110; i++) {
      var t = Math.PI * rng();
      p.push([ox + sx*Math.cos(t) + gauss()*6, oy - sy*Math.sin(t) + gauss()*6]);
    }
    for (var j = 0; j < 110; j++) {
      var t2 = Math.PI * rng();
      p.push([ox + sx*(1-Math.cos(t2)) + gauss()*6, oy - sy*(0.5-Math.sin(t2)) + gauss()*6]);
    }
    return p;
  }
  function rings() {
    var p = [];
    for (var i = 0; i < 240; i++) {
      var t = 2*Math.PI*rng(), r = 108 + gauss()*6;
      p.push([180 + r*Math.cos(t), 145 + r*Math.sin(t)*0.95]);
    }
    for (var j = 0; j < 100; j++) {
      var t2 = 2*Math.PI*rng(), r2 = 40 + gauss()*5;
      p.push([180 + r2*Math.cos(t2), 145 + r2*Math.sin(t2)]);
    }
    return p;
  }
  function blobs() {
    var p = [];
    [[100,90],[255,110],[170,215]].forEach(function (c) {
      for (var i = 0; i < 55; i++) { p.push([c[0]+gauss()*22, c[1]+gauss()*20]); }
    });
    // lonely outliers
    [[330,40],[30,250],[340,260],[25,35],[320,160]].forEach(function (o) { p.push(o.slice()); });
    return p;
  }
  function clip(p) {
    return [Math.min(W-8, Math.max(8, p[0])), Math.min(H-8, Math.max(8, p[1]))];
  }
  function unevenDensity() {
    var p = [];
    // one TIGHT, dense cluster
    for (var i = 0; i < 70; i++) { p.push(clip([75 + gauss()*9, 75 + gauss()*9])); }
    // one SPARSE, spread-out cluster — same point count, much more spread
    for (var j = 0; j < 70; j++) { p.push(clip([255 + gauss()*42, 190 + gauss()*42])); }
    return p;
  }
  function noStructure() {
    var p = [];
    for (var i = 0; i < 150; i++) { p.push([14 + rng()*(W-28), 14 + rng()*(H-28)]); }
    return p;
  }
  var DATA = [moons, rings, blobs, unevenDensity, noStructure];
  var KFOR = [2, 2, 3, 2, 3];
  var VERDICT = [
    "&#127769; <b>K-Means slices straight through both moons</b> &#8212; it can only draw round territories. DBSCAN follows the crowd and traces each crescent perfectly.",
    "&#128993; A ring around a ball is impossible for K-Means &#8212; no straight line separates them. For DBSCAN they are just two dense crowds. Try lowering eps until the ring splits!",
    "&#128064; On round blobs BOTH do fine &#8212; but watch the 5 loners: K-Means FORCES each into a cluster; DBSCAN marks them &#10005; noise. That is why fraud detection loves DBSCAN.",
    "&#9878;&#65039; DBSCAN uses ONE global eps for the whole plot &#8212; tune it for the sparse cluster and the dense one looks fine too, tune it for the dense one and the sparse cluster shatters into noise. This is DBSCAN's real weakness: clusters with very different densities.",
    "&#127922; There is no real structure here, just uniform random noise. K-Means still confidently carves it into K regions because you told it to. DBSCAN never gives that false confidence &#8212; slide eps up and down and it only ever answers 'meaningless fragments + noise' or 'it's all just one blob,' never K clean groups."
  ];
  var pts = [], dsi = 0;

  function dist2(a,b){var dx=a[0]-b[0],dy=a[1]-b[1];return dx*dx+dy*dy;}

  function kmeans(K) {
    var best = null;
    for (var r = 0; r < 6; r++) {
      var cents = [];
      for (var k = 0; k < K; k++) { cents.push(pts[Math.floor(rng()*pts.length)].slice()); }
      var assign = new Array(pts.length).fill(0);
      for (var it = 0; it < 40; it++) {
        var moved = 0;
        for (var i = 0; i < pts.length; i++) {
          var bi = 0, bd = Infinity;
          for (var k2 = 0; k2 < K; k2++) {
            var d = dist2(pts[i], cents[k2]);
            if (d < bd) { bd = d; bi = k2; }
          }
          assign[i] = bi;
        }
        for (var k3 = 0; k3 < K; k3++) {
          var sx=0, sy=0, n=0;
          for (var i2=0;i2<pts.length;i2++){ if(assign[i2]===k3){sx+=pts[i2][0];sy+=pts[i2][1];n++;} }
          if (n>0){ moved=Math.max(moved,Math.abs(cents[k3][0]-sx/n)+Math.abs(cents[k3][1]-sy/n));
                    cents[k3]=[sx/n,sy/n]; }
        }
        if (moved < 0.3) { break; }
      }
      var wss = 0;
      for (var i3=0;i3<pts.length;i3++){ wss += dist2(pts[i3], cents[assign[i3]]); }
      if (!best || wss < best.wss) { best = { wss:wss, assign:assign.slice(), cents:cents }; }
    }
    return best;
  }

  function dbscan(eps, minPts) {
    var n = pts.length, labels = new Array(n).fill(-2); // -2 unvisited, -1 noise
    var eps2 = eps*eps, cid = 0;
    function neigh(i) {
      var r = [];
      for (var j = 0; j < n; j++) { if (dist2(pts[i], pts[j]) <= eps2) { r.push(j); } }
      return r;
    }
    for (var i = 0; i < n; i++) {
      if (labels[i] !== -2) { continue; }
      var N = neigh(i);
      if (N.length < minPts) { labels[i] = -1; continue; }
      labels[i] = cid;
      var queue = N.slice();
      while (queue.length) {
        var q = queue.pop();
        if (labels[q] === -1) { labels[q] = cid; }
        if (labels[q] !== -2) { continue; }
        labels[q] = cid;
        var Nq = neigh(q);
        if (Nq.length >= minPts) { queue = queue.concat(Nq); }
      }
      cid++;
    }
    return { labels: labels, nClusters: cid };
  }

  function drawKM(res, K) {
    var c = $("ckm").getContext("2d");
    c.clearRect(0, 0, W, H);
    for (var i = 0; i < pts.length; i++) {
      c.fillStyle = PAL[res.assign[i] % PAL.length];
      c.beginPath(); c.arc(pts[i][0], pts[i][1], 4, 0, 7); c.fill();
    }
    for (var k = 0; k < K; k++) {
      c.fillStyle = PAL[k % PAL.length]; c.strokeStyle = "#12333D"; c.lineWidth = 3;
      c.beginPath(); c.arc(res.cents[k][0], res.cents[k][1], 9, 0, 7); c.fill(); c.stroke();
    }
  }
  function drawDB(res) {
    var c = $("cdb").getContext("2d");
    c.clearRect(0, 0, W, H);
    for (var i = 0; i < pts.length; i++) {
      var l = res.labels[i];
      if (l === -1) {
        c.strokeStyle = "#8AA1A8"; c.lineWidth = 2;
        var x = pts[i][0], y = pts[i][1];
        c.beginPath(); c.moveTo(x-4,y-4); c.lineTo(x+4,y+4);
        c.moveTo(x+4,y-4); c.lineTo(x-4,y+4); c.stroke();
      } else {
        c.fillStyle = PAL[l % PAL.length];
        c.beginPath(); c.arc(pts[i][0], pts[i][1], 4, 0, 7); c.fill();
      }
    }
    return res.nClusters;
  }

  function run() {
    var km = kmeans(KFOR[dsi]);
    drawKM(km, KFOR[dsi]);
    var eps = +$("rEps").value;
    $("vEps").textContent = eps;
    var db = dbscan(eps, 4);
    drawDB(db);
    var noise = db.labels.filter(function (l) { return l === -1; }).length;
    $("verdict").innerHTML = VERDICT[dsi] +
      "<br><span style='color:#517079;font-size:12px'>DBSCAN found <b>" + db.nClusters +
      "</b> cluster(s) by itself and labeled <b>" + noise + "</b> point(s) as noise &#10005;.</span>";
  }

  [0,1,2,3,4].forEach(function (i) {
    $("d"+i).onclick = function () {
      dsi = i;
      [0,1,2,3,4].forEach(function (j) { $("d"+j).className = (j===i) ? "on" : ""; });
      seed = 5 + i;
      pts = DATA[i]();
      run();
    };
  });
  $("rEps").oninput = run;

  pts = DATA[0]();
  run();
})();
</script>
</body>
</html>
