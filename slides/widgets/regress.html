<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .stage { display:flex; gap:20px; align-items:flex-start; justify-content:center; }
  .stage > div:first-child, .stage > canvas { flex:0 0 auto; }
  canvas { border:1px solid #CDD8DA; border-radius:10px; background:#fff; display:block; }
  #side { width:250px; flex:0 0 250px; }
  .sl { margin:10px 0; }
  .sl label { display:flex; justify-content:space-between; font-size:13px; color:#517079; font-weight:700; margin-bottom:2px; }
  .sl label b { font-family:"JetBrains Mono",Menlo,monospace; color:#00567D; }
  input[type=range] { width:100%; accent-color:#00567D; }
  #eq { font-family:"JetBrains Mono",Menlo,monospace; font-size:14px; font-weight:700;
        color:#00567D; text-align:center; margin:8px 0; min-height:20px; word-break:break-word; }
  #mse { text-align:center; margin:10px 0; }
  #mse b { font-family:"JetBrains Mono",Menlo,monospace; font-size:22px; color:#C0504D; }
  #verdict { font-size:13px; color:#12333D; min-height:38px; text-align:center; }
  #ctl { display:flex; gap:7px; justify-content:center; margin-top:8px; }
</style>
</head>
<body>
<div class="w">
  <div class="stage">
    <canvas id="cv" width="470" height="360"></canvas>
    <div id="side">
      <div id="eq"></div>
      <div class="sl"><label>slope m <b id="vm"></b></label>
        <input type="range" id="rm" min="0" max="15" step="0.1" value="2"></div>
      <div class="sl"><label>intercept b <b id="vb"></b></label>
        <input type="range" id="rb" min="-100" max="200" step="5" value="150"></div>
      <div id="mse">MSE = <b id="vmse"></b></div>
      <div id="verdict"></div>
      <div id="ctl">
        <button class="primary" id="bBest">&#10024; Reveal the best fit</button>
        <button id="bReset">&#8634; Reset</button>
      </div>
    </div>
  </div>
</div>
<script>
(function () {
  function $(id) { return document.getElementById(id); }
  var W = 470, H = 360, PADL = 52, PADB = 40, PADT = 16, PADR = 14;
  // workout minutes (x: 5..65) vs calories (y): truth = 7.2x + 15 + noise
  var seed = 3;
  function rng() { seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296; }
  var xs = [], ys = [];
  for (var i = 0; i < 22; i++) {
    var x = 5 + 60 * rng();
    xs.push(x);
    ys.push(7.2 * x + 15 + (rng() - 0.5) * 90);
  }
  var XMIN = 0, XMAX = 70, YMIN = 0, YMAX = 550;
  function px(x) { return PADL + (x - XMIN) / (XMAX - XMIN) * (W - PADL - PADR); }
  function py(y) { return H - PADB - (y - YMIN) / (YMAX - YMIN) * (H - PADB - PADT); }

  var m = 2, b = 150;
  // closed-form least squares for the reveal
  var n = xs.length, sx = 0, sy = 0, sxx = 0, sxy = 0;
  for (var k = 0; k < n; k++) { sx += xs[k]; sy += ys[k]; sxx += xs[k]*xs[k]; sxy += xs[k]*ys[k]; }
  var BM = (n*sxy - sx*sy) / (n*sxx - sx*sx);
  var BB = (sy - BM*sx) / n;
  function mseOf(mm, bb) {
    var s = 0;
    for (var i2 = 0; i2 < n; i2++) { var e = (mm*xs[i2] + bb) - ys[i2]; s += e*e; }
    return s / n;
  }
  var BESTMSE = mseOf(BM, BB);

  var ctx = $("cv").getContext("2d");
  function draw() {
    ctx.clearRect(0, 0, W, H);
    // axes
    ctx.strokeStyle = "#8AA1A8"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(PADL, PADT); ctx.lineTo(PADL, H-PADB); ctx.lineTo(W-PADR, H-PADB); ctx.stroke();
    ctx.fillStyle = "#517079"; ctx.font = "700 12px 'Nunito Sans', sans-serif"; ctx.textAlign = "center";
    ctx.fillText("workout minutes", (PADL+W)/2, H - 10);
    ctx.save(); ctx.translate(16, H/2); ctx.rotate(-Math.PI/2); ctx.fillText("calories burned", 0, 0); ctx.restore();
    // residual lines
    ctx.strokeStyle = "rgba(192,80,77,0.55)"; ctx.lineWidth = 1.6;
    for (var i = 0; i < n; i++) {
      var yhat = m*xs[i] + b;
      ctx.beginPath(); ctx.moveTo(px(xs[i]), py(ys[i])); ctx.lineTo(px(xs[i]), py(yhat)); ctx.stroke();
    }
    // the line
    ctx.strokeStyle = "#00567D"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(px(XMIN), py(m*XMIN + b)); ctx.lineTo(px(XMAX), py(m*XMAX + b)); ctx.stroke();
    // points
    for (var j = 0; j < n; j++) {
      ctx.fillStyle = "#FFD728"; ctx.strokeStyle = "#12333D"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(px(xs[j]), py(ys[j]), 5, 0, 7); ctx.fill(); ctx.stroke();
    }
    var cur = mseOf(m, b);
    $("vm").textContent = m.toFixed(1);
    $("vb").textContent = b.toFixed(0);
    $("eq").innerHTML = "calories = " + m.toFixed(1) + " &#215; minutes + " + b.toFixed(0);
    $("vmse").textContent = Math.round(cur).toLocaleString();
    var ratio = cur / BESTMSE;
    if (ratio < 1.05)      { $("verdict").innerHTML = "&#127942; <b>That IS the best fit.</b> No line scores lower &#8212; training = finding exactly this."; }
    else if (ratio < 1.6)  { $("verdict").innerHTML = "&#128293; Very close! The red residual bars are nearly as short as they can get."; }
    else if (ratio < 6)    { $("verdict").innerHTML = "Getting warmer &#8212; keep shrinking those red error bars."; }
    else                   { $("verdict").innerHTML = "The red bars are the ERRORS. MSE is their squares, averaged. Make them small!"; }
  }
  $("rm").oninput = function () { m = +this.value; draw(); };
  $("rb").oninput = function () { b = +this.value; draw(); };
  $("bBest").onclick = function () {
    m = BM; b = BB;
    $("rm").value = m; $("rb").value = b;
    draw();
  };
  $("bReset").onclick = function () {
    m = 2; b = 150; $("rm").value = 2; $("rb").value = 150; draw();
  };
  draw();
})();
</script>
</body>
</html>
