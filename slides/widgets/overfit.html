<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .stage { display:flex; gap:20px; align-items:flex-start; justify-content:center; }
  .stage > div:first-child, .stage > canvas { flex:0 0 auto; }
  canvas { border:1px solid #CDD8DA; border-radius:10px; background:#fff; display:block; }
  #side { width:260px; flex:0 0 260px; }
  .sl { margin:8px 0 14px; }
  .sl label { display:flex; justify-content:space-between; font-size:13px; color:#517079; font-weight:700; margin-bottom:2px; }
  .sl label b { font-family:"JetBrains Mono",Menlo,monospace; color:#00567D; font-size:15px; }
  input[type=range] { width:100%; accent-color:#8064A2; }
  .met { margin:10px 0; }
  .met label { display:flex; justify-content:space-between; font-size:12.5px; font-weight:700; margin-bottom:3px; }
  .met label b { font-family:"JetBrains Mono",Menlo,monospace; font-size:14px; }
  .barbg { height:13px; background:#E0E7E8; border-radius:7px; overflow:hidden; }
  .barbg i { display:block; height:100%; border-radius:7px; transition:width 250ms ease; }
  #verdict { font-size:13.5px; min-height:60px; color:#12333D; margin-top:8px; }
  .legend { font-size:11.5px; color:#517079; font-weight:700; margin-top:6px; text-align:center; }
</style>
</head>
<body>
<div class="w">
  <div class="stage">
    <div>
      <canvas id="cv" width="470" height="360"></canvas>
      <div class="legend">&#9679; yellow = training data &nbsp;&nbsp; &#9633; teal = test data (the model NEVER saw these)</div>
    </div>
    <div id="side">
      <div class="sl"><label>Model complexity (polynomial degree) <b id="vd">1</b></label>
        <input type="range" id="rd" min="1" max="9" step="1" value="1"></div>
      <div class="met"><label style="color:#B8860B">Training error <b id="vtr" style="color:#B8860B">—</b></label>
        <div class="barbg"><i id="btr" style="background:#FFD728"></i></div></div>
      <div class="met"><label style="color:#1F8F89">Test error <b id="vte" style="color:#1F8F89">—</b></label>
        <div class="barbg"><i id="bte" style="background:#33D2CB"></i></div></div>
      <div id="verdict"></div>
    </div>
  </div>
</div>
<script>
(function () {
  function $(id) { return document.getElementById(id); }
  var W = 470, H = 360, PAD = 26;
  var seed = 42;
  function rng() { seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296; }
  function truth(x) { return 0.8*Math.sin(2.6*x) + 0.3*x; }

  var trX=[], trY=[], teX=[], teY=[];
  for (var i=0;i<18;i++){ var x=-1+2*rng(); trX.push(x); trY.push(truth(x)+(rng()-0.5)*0.5); }
  for (var j=0;j<10;j++){ var x2=-0.95+1.9*rng(); teX.push(x2); teY.push(truth(x2)+(rng()-0.5)*0.5); }

  function polyfit(xs, ys, deg) {
    var n = deg + 1, ATA = [], ATy = [];
    for (var i = 0; i < n; i++) { ATA.push(new Array(n).fill(0)); ATy.push(0); }
    for (var p = 0; p < xs.length; p++) {
      var pow = [1];
      for (var d = 1; d < n; d++) { pow.push(pow[d-1] * xs[p]); }
      for (var i2 = 0; i2 < n; i2++) {
        ATy[i2] += pow[i2] * ys[p];
        for (var jj = 0; jj < n; jj++) { ATA[i2][jj] += pow[i2] * pow[jj]; }
      }
    }
    for (var r = 0; r < n; r++) { ATA[r][r] += 1e-8; }
    for (var c = 0; c < n; c++) {
      var piv = c;
      for (var r2 = c+1; r2 < n; r2++) { if (Math.abs(ATA[r2][c]) > Math.abs(ATA[piv][c])) { piv = r2; } }
      var tmp = ATA[c]; ATA[c] = ATA[piv]; ATA[piv] = tmp;
      var t2 = ATy[c]; ATy[c] = ATy[piv]; ATy[piv] = t2;
      for (var r3 = c+1; r3 < n; r3++) {
        var f = ATA[r3][c] / ATA[c][c];
        for (var c2 = c; c2 < n; c2++) { ATA[r3][c2] -= f * ATA[c][c2]; }
        ATy[r3] -= f * ATy[c];
      }
    }
    var coef = new Array(n).fill(0);
    for (var r4 = n-1; r4 >= 0; r4--) {
      var s = ATy[r4];
      for (var c3 = r4+1; c3 < n; c3++) { s -= ATA[r4][c3] * coef[c3]; }
      coef[r4] = s / ATA[r4][r4];
    }
    return coef;
  }
  function evalPoly(coef, x) { var y = 0; for (var i = coef.length-1; i >= 0; i--) { y = y*x + coef[i]; } return y; }
  function mse(xs, ys, coef) { var s = 0; for (var i=0;i<xs.length;i++){var e=evalPoly(coef,xs[i])-ys[i];s+=e*e;} return s/xs.length; }

  var YMIN = -1.6, YMAX = 1.6;
  function px(x) { return PAD + (x + 1) / 2 * (W - 2*PAD); }
  function py(y) { return H - PAD - (y - YMIN) / (YMAX - YMIN) * (H - 2*PAD); }

  var ctx = $("cv").getContext("2d");
  function draw(deg) {
    var coef = polyfit(trX, trY, deg);
    ctx.clearRect(0, 0, W, H);
    // fitted curve
    ctx.strokeStyle = "#8064A2"; ctx.lineWidth = 3;
    ctx.beginPath();
    var started = false;
    for (var x = -1; x <= 1.0001; x += 0.01) {
      var y = evalPoly(coef, x);
      if (y < YMIN - 3 || y > YMAX + 3) { started = false; continue; }
      var X = px(x), Y = py(Math.max(YMIN-0.4, Math.min(YMAX+0.4, y)));
      if (!started) { ctx.moveTo(X, Y); started = true; } else { ctx.lineTo(X, Y); }
    }
    ctx.stroke();
    // train points
    for (var i = 0; i < trX.length; i++) {
      ctx.fillStyle = "#FFD728"; ctx.strokeStyle = "#12333D"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(px(trX[i]), py(trY[i]), 5.5, 0, 7); ctx.fill(); ctx.stroke();
    }
    // test points
    for (var j = 0; j < teX.length; j++) {
      ctx.fillStyle = "#33D2CB"; ctx.strokeStyle = "#12333D"; ctx.lineWidth = 1.5;
      var X2 = px(teX[j]), Y2 = py(teY[j]);
      ctx.fillRect(X2-5, Y2-5, 10, 10); ctx.strokeRect(X2-5, Y2-5, 10, 10);
    }
    var tr = mse(trX, trY, coef), te = mse(teX, teY, coef);
    $("vtr").textContent = tr.toFixed(3);
    $("vte").textContent = te > 9.99 ? te.toFixed(0) : te.toFixed(3);
    $("btr").style.width = Math.min(100, tr * 300) + "%";
    $("bte").style.width = Math.min(100, te * 300) + "%";
    if (deg <= 1) {
      $("verdict").innerHTML = "&#128564; <b>Underfitting</b> &#8212; a straight line can't follow this pattern. BOTH errors are high. The skimmer student: bad on practice AND the exam.";
    } else if (deg <= 4) {
      $("verdict").innerHTML = "&#127919; <b>Healthy fit</b> &#8212; the curve follows the PATTERN, not every point. Train and test errors are low and CLOSE together. Deploy this one.";
    } else if (deg <= 6) {
      $("verdict").innerHTML = "&#129300; Starting to wiggle&#8230; training error keeps falling, but watch the test error. The gap between the bars is opening.";
    } else {
      $("verdict").innerHTML = "&#128561; <b>Overfitting!</b> The curve contorts through every yellow point &#8212; training error is tiny &#8212; but it MISSES the teal test squares. The memorizer: aces practice, collapses in the exam.";
    }
  }
  $("rd").oninput = function () { $("vd").textContent = this.value; draw(+this.value); };
  draw(1);
})();
</script>
</body>
</html>
