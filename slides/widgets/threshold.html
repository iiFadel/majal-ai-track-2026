<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  canvas { border:1px solid #CDD8DA; border-radius:10px; background:#fff; display:block; margin:0 auto; }
  .sl { max-width:560px; margin:10px auto 4px; }
  .sl label { display:flex; justify-content:space-between; font-size:13px; color:#517079; font-weight:700; margin-bottom:2px; }
  .sl label b { font-family:"JetBrains Mono",Menlo,monospace; color:#00567D; }
  input[type=range] { width:100%; accent-color:#C0504D; }
  .grid { display:flex; gap:22px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
  table.cm { border-collapse:collapse; }
  table.cm td, table.cm th {
    border:1px solid #CDD8DA; padding:6px 12px; font-size:13px; text-align:center;
    font-family:"JetBrains Mono",Menlo,monospace;
  }
  table.cm th { background:#00567D; color:#fff; font-family:"Nunito Sans",sans-serif; font-weight:800; font-size:11.5px; }
  .met { min-width:210px; }
  .met .row { margin:8px 0; }
  .met label { display:flex; justify-content:space-between; font-size:12.5px; color:#517079; font-weight:700; margin-bottom:3px; }
  .met label b { font-family:"JetBrains Mono",Menlo,monospace; color:#00567D; font-size:14px; }
  .barbg { height:12px; background:#E0E7E8; border-radius:6px; overflow:hidden; }
  .barbg i { display:block; height:100%; border-radius:6px; transition:width 250ms ease; }
  #story { margin-top:10px; font-size:13.5px; text-align:center; color:#12333D; min-height:40px; }
  #presets { display:flex; gap:7px; justify-content:center; margin-bottom:10px; }
</style>
</head>
<body>
<div class="w">
  <div id="presets">
    <button id="pSpam" class="on">&#128231; Spam-filter mindset</button>
    <button id="pMed">&#127973; Medical-screening mindset</button>
  </div>
  <canvas id="cv" width="580" height="180"></canvas>
  <div class="sl"><label>Decision threshold <b id="vt">0.50</b></label>
    <input type="range" id="rt" min="0.02" max="0.98" step="0.01" value="0.5"></div>
  <div class="grid">
    <table class="cm">
      <tr><th></th><th>actually spam</th><th>actually NOT spam</th></tr>
      <tr><th>model: spam</th><td id="tp" style="background:#CFE6E9">TP —</td><td id="fp" style="background:#F8E1E0">FP —</td></tr>
      <tr><th>model: not spam</th><td id="fn" style="background:#F8E1E0">FN —</td><td id="tn" style="background:#CFE6E9">TN —</td></tr>
    </table>
    <div class="met">
      <div class="row"><label>Precision <b id="vP">—</b></label><div class="barbg"><i id="bP" style="background:#00567D"></i></div></div>
      <div class="row"><label>Recall <b id="vR">—</b></label><div class="barbg"><i id="bR" style="background:#1F8F89"></i></div></div>
      <div class="row"><label>Accuracy <b id="vA">—</b></label><div class="barbg"><i id="bA" style="background:#8AA1A8"></i></div></div>
    </div>
  </div>
  <div id="story"></div>
</div>
<script>
(function () {
  function $(id) { return document.getElementById(id); }
  var W = 580, H = 180;
  var seed = 11;
  function rng() { seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296; }
  function gauss() { return (rng()+rng()+rng()+rng()-2) * 1.7; }

  // each email has a model score in [0,1]; spam scores high-ish, ham low-ish (with overlap!)
  var emails = [];
  for (var i = 0; i < 34; i++) { emails.push({ s: Math.min(0.98, Math.max(0.02, 0.72 + gauss()*0.13)), spam: true }); }
  for (var j = 0; j < 46; j++) { emails.push({ s: Math.min(0.98, Math.max(0.02, 0.30 + gauss()*0.13)), spam: false }); }

  var mode = "spam";
  var ctx = $("cv").getContext("2d");

  function draw(th) {
    ctx.clearRect(0, 0, W, H);
    // axis
    ctx.strokeStyle = "#8AA1A8"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(24, H-30); ctx.lineTo(W-16, H-30); ctx.stroke();
    ctx.fillStyle = "#517079"; ctx.font = "700 11.5px 'Nunito Sans', sans-serif";
    ctx.textAlign = "left"; ctx.fillText("model score: 0 = definitely fine", 24, H-10);
    ctx.textAlign = "right"; ctx.fillText("1 = definitely spam", W-16, H-10);
    // decision regions
    var tx = 24 + th * (W-40);
    ctx.fillStyle = "rgba(31,143,137,0.07)"; ctx.fillRect(24, 10, tx-24, H-46);
    ctx.fillStyle = "rgba(192,80,77,0.07)"; ctx.fillRect(tx, 10, W-16-tx, H-46);
    // emails as dots with slight jitter rows
    emails.forEach(function (e, idx) {
      var x = 24 + e.s * (W-40);
      var y = 34 + (idx % 8) * 12 + (e.spam ? 0 : 4);
      ctx.beginPath();
      if (e.spam) {
        ctx.fillStyle = "#C0504D";
        ctx.arc(x, y, 5, 0, 7); ctx.fill();
      } else {
        ctx.fillStyle = "#00567D";
        ctx.rect(x-4, y-4, 8, 8); ctx.fill();
      }
    });
    // threshold line
    ctx.strokeStyle = "#12333D"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(tx, 8); ctx.lineTo(tx, H-30); ctx.stroke();
    ctx.fillStyle = "#12333D"; ctx.textAlign = "center"; ctx.font = "800 12px 'Nunito Sans', sans-serif";
    ctx.fillText("\u25B2 spam \u2192", tx + 34, 18);
    // legend
    ctx.textAlign = "left"; ctx.font = "700 11.5px 'Nunito Sans', sans-serif";
    ctx.fillStyle = "#C0504D"; ctx.fillText("\u25CF real spam", 30, 20);
    ctx.fillStyle = "#00567D"; ctx.fillText("\u25A0 real email", 120, 20);
  }

  function update() {
    var th = +$("rt").value;
    $("vt").textContent = th.toFixed(2);
    draw(th);
    var TP=0, FP=0, FN=0, TN=0;
    emails.forEach(function (e) {
      var pred = e.s >= th;
      if (pred && e.spam) { TP++; }
      else if (pred && !e.spam) { FP++; }
      else if (!pred && e.spam) { FN++; }
      else { TN++; }
    });
    $("tp").textContent = "TP " + TP; $("fp").textContent = "FP " + FP;
    $("fn").textContent = "FN " + FN; $("tn").textContent = "TN " + TN;
    var P = TP + FP > 0 ? TP/(TP+FP) : 1;
    var R = TP + FN > 0 ? TP/(TP+FN) : 0;
    var A = (TP+TN)/emails.length;
    $("vP").textContent = (P*100).toFixed(0) + "%"; $("bP").style.width = (P*100)+"%";
    $("vR").textContent = (R*100).toFixed(0) + "%"; $("bR").style.width = (R*100)+"%";
    $("vA").textContent = (A*100).toFixed(0) + "%"; $("bA").style.width = (A*100)+"%";

    if (mode === "spam") {
      if (FP === 0) { $("story").innerHTML = "&#9989; <b>Zero false positives</b> &#8212; no real email in junk. Precision is protected&#8230; but count the spam sneaking through (FN)."; }
      else { $("story").innerHTML = "&#9888;&#65039; <b>" + FP + " real email(s) in the junk folder!</b> One of them might be a job offer. For spam filters, FP is the expensive mistake &#8212; push the threshold RIGHT."; }
    } else {
      if (FN === 0) { $("story").innerHTML = "&#9989; <b>Zero missed cases</b> &#8212; recall 100%. Some false alarms (FP), but a false alarm is a re-test; a miss is a catastrophe."; }
      else { $("story").innerHTML = "&#128680; <b>" + FN + " sick patient(s) sent home!</b> In medical screening, FN is the deadly mistake &#8212; push the threshold LEFT until recall hits 100%."; }
    }
  }

  $("rt").oninput = update;
  $("pSpam").onclick = function () { mode = "spam"; $("pSpam").className = "on"; $("pMed").className = ""; update(); };
  $("pMed").onclick = function () { mode = "med"; $("pMed").className = "on"; $("pSpam").className = ""; update(); };
  update();
})();
</script>
</body>
</html>
